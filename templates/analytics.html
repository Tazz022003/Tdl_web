{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">Analytics</h2>

<a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-4">
    Back to Dashboard
</a>

<div class="row mb-4 text-center">
    <div class="col-md-3 mb-3">
        <div class="card text-white bg-primary p-3 shadow">
            <h5>Total Tasks</h5>
            <h3>{{ total }}</h3>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-white bg-success p-3 shadow">
            <h5>Done</h5>
            <h3>{{ done }}</h3>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-white bg-warning p-3 shadow">
            <h5>Pending</h5>
            <h3>{{ pending }}</h3>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-white bg-danger p-3 shadow">
            <h5>Overdue</h5>
            <h3>{{ overdue }}</h3>
        </div>
    </div>
</div>

<div class="row">

    <!-- Pie Chart -->
    <div class="col-md-6 mb-4">
        <div class="card p-4 shadow">
            <h5 class="text-center">Task Status Distribution</h5>
            <canvas id="statusChart"></canvas>
        </div>
    </div>

    <!-- Bar Chart -->
    <div class="col-md-6 mb-4">
        <div class="card p-4 shadow">
            <h5 class="text-center">Overdue Overview</h5>
            <canvas id="overdueChart"></canvas>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const done = {{ done }};
const pending = {{ pending }};
const overdue = {{ overdue }};
const total = {{ total }};

// PIE CHART
new Chart(document.getElementById("statusChart"), {
    type: "pie",
    data: {
        labels: ["Done", "Pending"],
        datasets: [{
            data: [done, pending],
            backgroundColor: ["#198754", "#ffc107"]
        }]
    }
});

// BAR CHART
new Chart(document.getElementById("overdueChart"), {
    type: "bar",
    data: {
        labels: ["Total Tasks", "Overdue"],
        datasets: [{
            label: "Tasks",
            data: [total, overdue],
            backgroundColor: ["#0d6efd", "#dc3545"]
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

{% endblock %}
