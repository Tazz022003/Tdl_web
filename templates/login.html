{% extends "base.html" %}
{% block content %}

<h2>Login</h2>
<form method="POST">
    <input type="text" name="username" placeholder="Username" required class="form-control mt-2">
    <input type="password" name="password" placeholder="Password" required class="form-control mt-2">
    <button type="submit" class="btn btn-primary mt-3">Login</button>
</form>
<a href="{{ url_for('register') }}" class="btn btn-link mt-2">Create account</a>

{% endblock %}
