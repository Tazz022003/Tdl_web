{% extends "base.html" %}
{% block content %}

<h2>Register</h2>
<form method="POST">
    <input type="text" name="username" placeholder="Username" required class="form-control mt-2">
    <input type="password" name="password" placeholder="Password" required class="form-control mt-2">
    <button type="submit" class="btn btn-success mt-3">Register</button>
</form>
<a href="{{ url_for('login') }}" class="btn btn-link mt-2">Already have account? Login</a>

{% endblock %}
